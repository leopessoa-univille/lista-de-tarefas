<!DOCTYPE html>
<html>
    <head>
        <title>Lista de Tarefas</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    </head>

    <body bgcolor="lightgray">
        <h1>Bem vindo á sua lista de tarefas</h1>
        <br>
        <br>
        <table class="table" id="Tabela">
            <thead>
                <tr>
                <th scope="col" id="idT">N°</th>
                <th scope="col">Tarefa</th>
                <th scope="col">Data</th>
                <th scope="col">Situação</th>
                <th scope="col">Ações</th>
                </tr>
            </thead>
            <tbody class="table-group-divider">
                <tr>
                
                </tr>
                <tr>
                
                </tr>
                <tr>
                
                </tr>
            </tbody>
        </table>
        
        <input type="text" id="inputNome" placeholder="Nome da tarefa">
        <input type="date" id="inputData">
        <select id="selectSituacao">
            <option value="A fazer">A fazer</option>
            <option value="Concluído">Concluído</option>
        </select>
        <button onclick="addTarefa()">Adicionar Tarefa</button>

        <script src="tarefas.js"></script>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    </body>
</html>
